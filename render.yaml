services:
  - type: web
    name: mattest-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # à renseigner manuellement (Supabase URL)
      - key: REDIS_URL
        sync: false          # à renseigner manuellement (Upstash URL)
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        sync: false          # URL Vercel de ton frontend
      - key: ML_MODELS_DIR
        value: ./ml_models
      - key: REPORTS_DIR
        value: ./reports
