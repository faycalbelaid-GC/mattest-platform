version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mattest_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mattest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mattest_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-mattest_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mattest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mattest_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mattest_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mattest}:${POSTGRES_PASSWORD:-mattest_secure_2024}@postgres:5432/${POSTGRES_DB:-mattest_db}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
      - reports_storage:/app/reports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: mattest_mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER:-mattest}:${POSTGRES_PASSWORD:-mattest_secure_2024}@postgres:5432/${POSTGRES_DB:-mattest_db}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-mattest}:${POSTGRES_PASSWORD:-mattest_secure_2024}@postgres:5432/${POSTGRES_DB:-mattest_db} --default-artifact-root /mlflow/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mattest_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mattest_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  ml_models:
  reports_storage:
  mlflow_artifacts:
